name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
          - goarch: arm
            goarm: "7"
            artifact_arch: armhf

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ssh-session-notifier-${{ matrix.artifact_arch || matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssh-session-notifier-${{ matrix.artifact_arch || matrix.goarch }}
          path: ssh-session-notifier-${{ matrix.artifact_arch || matrix.goarch }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum ssh-session-notifier-* > sha256sums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGES.md
          generate_release_notes: true
          files: |
            ssh-session-notifier-amd64
            ssh-session-notifier-arm64
            ssh-session-notifier-armhf
            sha256sums.txt
